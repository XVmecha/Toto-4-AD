name: Run CPU Pytests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  run-cpu-pytests:
    name: Run CPU Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run CPU-specific Pytests
      run: pytest toto/test -m "not cuda"
